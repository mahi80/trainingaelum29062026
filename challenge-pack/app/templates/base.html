<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{{ app_name | default("AutoLoan-DocIntel") }}{% endblock %}</title>
  <!-- Vendored locally (see app/static/README.md). PROVIDED. -->
  <script src="/static/htmx.min.js" defer></script>
  <script src="/static/sse.js" defer></script>
  <style>
    :root {
      --bg: #0f1117; --panel: #171a23; --border: #262b38;
      --fg: #e6e8ee; --muted: #98a0b3; --accent: #5b8cff; --danger: #ff6b6b;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    header {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header .brand { font-weight: 700; letter-spacing: .2px; }
    header nav { display: flex; gap: 1rem; margin-left: auto; }
    header nav a { color: var(--muted); text-decoration: none; }
    header nav a:hover { color: var(--fg); }
    main { padding: 1.25rem; max-width: 1100px; margin: 0 auto; }
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem; margin-bottom: 1rem;
    }
    .muted { color: var(--muted); }
    a { color: var(--accent); }
    button {
      background: var(--accent); color: white; border: 0; border-radius: 8px;
      padding: .55rem 1rem; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: .6; cursor: not-allowed; }
    input, textarea {
      width: 100%; background: #0c0e14; color: var(--fg);
      border: 1px solid var(--border); border-radius: 8px; padding: .6rem;
      font-family: inherit;
    }
    textarea { font-family: var(--mono); resize: vertical; }
    code, pre { font-family: var(--mono); }
    pre {
      background: #0c0e14; border: 1px solid var(--border);
      border-radius: 8px; padding: .75rem; overflow: auto;
    }
    .error { color: var(--danger); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: .4rem .6rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header>
    <span class="brand">{{ app_name | default("AutoLoan-DocIntel") }}</span>
    <nav>
      {% if user %}
        <a href="/chat">Chat</a>
        <a href="/admin/catalog">Catalog</a>
        <span class="muted">{{ user.username }} ({{ user.role }})</span>
        <a href="/logout">Logout</a>
      {% else %}
        <a href="/login">Login</a>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
